<div class="container mt-5 d-flex justify-content-center">

  <div class="card p-4 shadow col-md-4 text-center">

    <div class="mb-2">
      <i class="bi bi-lock-fill text-brown fs-1"></i>
    </div>

    <h3 class="text-brown mb-1">Welcome Back</h3>
    <p class="text-muted mb-3">Please login to continue</p>

    <form [formGroup]="loginForm" (ngSubmit)="login()">

      <input class="form-control mb-2"
             placeholder="Username"
             formControlName="username">

      <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
           class="text-danger mb-2">
        Username required
      </div>

      <input type="password"
             class="form-control mb-2"
             placeholder="Password"
             formControlName="password">

      <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
           class="text-danger mb-2">
        Password required
      </div>

      <button class="btn bg-brown text-white w-100 mt-2">
        Login
      </button>

      <div class="alert alert-danger mt-3" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

    </form>

  </div>

</div>
