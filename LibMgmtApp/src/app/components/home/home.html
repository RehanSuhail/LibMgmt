<div class="container mt-5 text-center">

  <h2 class="mb-3 text-brown">Welcome, Admin 👋</h2>

  <p class="text-muted">
    This is your Library Management Dashboard.  
    From here you can manage libraries and books easily in one place.
  </p>

  <!-- ✅ Dashboard Image -->
  <div class="my-4">
    <img src="assets/dashboard.png"
         class="img-fluid rounded shadow"
         alt="dashboard"
         style="max-height: 400px; object-fit: cover;">
  </div>

  <div class="row mt-5">

    <div class="col-md-6 mb-4">
      <div class="card dashboard-card p-4" (click)="goToLibraries()">
        <div class="card-body">
          <i class="bi bi-building fs-1"></i>
          <h4 class="mt-3">Manage Libraries</h4>
          <p>View, add, update and delete libraries</p>
        </div>
      </div>
    </div>

    <div class="col-md-6 mb-4">
      <div class="card dashboard-card p-4" (click)="goToBooks()">
        <div class="card-body">
          <i class="bi bi-book fs-1"></i>
          <h4 class="mt-3">Manage Books</h4>
          <p>View, add, update and delete books</p>
        </div>
      </div>
    </div>

  </div>

</div>
