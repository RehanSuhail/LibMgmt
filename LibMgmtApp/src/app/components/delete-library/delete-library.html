<div class="container mt-5">

  <div class="card p-4 text-center shadow">

    <h3 class="text-brown mb-3">Delete Library</h3>

    <p class="text-danger fw-bold">
      Are you sure you want to delete this library?
    </p>

    <div *ngIf="library" class="mb-3 border rounded p-3 bg-light">

      <p><b>Name:</b> {{ library.name }}</p>
      <p><b>Address:</b> {{ library.address }}</p>
      <p><b>Capacity:</b> {{ library.maximumCapacity }}</p>

    </div>

    <div *ngIf="booksInLibrary.length > 0" class="mb-3 border rounded p-3 bg-warning-subtle">

      <p class="fw-bold text-danger">Books in this library:</p>

      <ul class="list-group">
        <li class="list-group-item" *ngFor="let book of booksInLibrary">
          {{ book.title }} by {{ book.author }}
        </li>
      </ul>

    </div>

    <div *ngIf="booksInLibrary.length === 0" class="mb-3">
      <p class="text-muted">No books found in this library.</p>
    </div>

    <div class="mt-3 d-flex justify-content-center gap-2">
      <button class="btn bg-brown text-white px-4"
              (click)="confirmDelete()">
        Yes, Delete
      </button>

      <button class="btn btn-outline-secondary px-4"
              (click)="cancel()">
        Cancel
      </button>
    </div>

  </div>

</div>
